<!DOCTYPE html>
<html>
<head>
<title>Samgraha Clinical Dashboard</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
margin:40px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

th{
background:#2563eb;
color:white;
}
</style>

</head>

<body>

<h1>Samgraha Clinical Dashboard</h1>

<button onclick="loadData()">Load Patient Data</button>

<table id="table">
<thead>
<tr>
<th>Patient</th>
<th>Diagnosis</th>
<th>Age</th>
<th>Document</th>
</tr>
</thead>

<tbody></tbody>
</table>

<script>

async function loadData(){

const response = await fetch("https://bbpzt86hx1.execute-api.us-east-1.amazonaws.com/prod/patient")

const data = await response.json()

const visits = data.visits

const table = document.querySelector("#table tbody")

table.innerHTML=""

visits.forEach(v=>{

const row = `
<tr>
<td>${v.patient_name}</td>
<td>${v.diagnosis}</td>
<td>${v.age}</td>
<td>${v.source_document}</td>
</tr>
`

table.innerHTML += row

})

}

</script>

</body>
</html>
